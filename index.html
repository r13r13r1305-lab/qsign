<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات 2026</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #38bdf8; font-size: 24px; margin-bottom: 25px; }
        .app-card { background: #1e293b; padding: 15px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .app-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #fff; }
        .app-info p { margin: 0; color: #94a3b8; font-size: 12px; }
        .install-btn { background: #0284c7; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; font-size: 14px; text-decoration: none; }
        .install-btn:hover { background: #0369a1; }
    </style>
</head>
<body>

    <div class="container">
        <h1>متجر التطبيقات والألعاب (2026)</h1>
        
        <!-- تطبيق تجريبي -->
        <div class="app-card">
            <div class="app-info">
                <h3>يوتيوب بلس (YouTube+)</h3>
                <p>الإصدار 20.4.1 (بدون إعلانات)</p>
            </div>
            <!-- استبدل الرابط أدناه برابط ملف الـ plist الخاص بك على GitHub أو Netlify -->
            <a href="itms-services://?action=download-manifest&url=https://YOUR_USERNAME.github.io/YOUR_REPO/youtube.plist" class="install-btn">تثبيت</a>
        </div>

    </div>

</body>
</html>
